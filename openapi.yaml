openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
paths:
  /api/auth/register:
    post:
      tags:
      - auth-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /api/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /api/admin/users:
    post:
      tags:
      - admin-controller
      operationId: addUser
      responses:
        "200":
          description: OK
  /api/admin/products:
    post:
      tags:
      - admin-controller
      operationId: createProduct
      parameters:
      - name: user
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/User"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /api/admin/product-categories:
    post:
      tags:
      - admin-controller
      operationId: createProductCategory
      parameters:
      - name: user
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/User"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductCategoryResponse"
  /api/auth/me:
    get:
      tags:
      - auth-controller
      operationId: me
      parameters:
      - name: user
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/User"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
components:
  schemas:
    RegisterUserRequestDto:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          maxLength: 128
          minLength: 8
    TokenResponseDto:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        user:
          $ref: "#/components/schemas/UserResponseDto"
    UserResponseDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        passwordHash:
          type: string
        role:
          type: string
          enum:
          - CUSTOMER
          - ADMIN
        active:
          type: boolean
    CreateProductRequest:
      type: object
      properties:
        categoryId:
          type: string
        name:
          type: string
        description:
          type: string
        priceMinor:
          type: integer
          format: int32
        ratingStars:
          type: integer
          format: int32
    ProductResponse:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        name:
          type: string
        description:
          type: string
        priceMinor:
          type: integer
          format: int32
        ratingStars:
          type: integer
          format: int32
    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
    ProductCategoryResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
